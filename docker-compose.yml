services:
  postgres:
    image: postgres:16-alpine
    container_name: sage-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sage_dev
      POSTGRES_USER: sage
      POSTGRES_PASSWORD: sage123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
